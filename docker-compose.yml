version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: jobtrack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobtrack
    ports:
      - "5432:5432"
    volumes:
      # - db_data:/var/lib/postgresql/data
      - ../db_data_postgres_jobtrack:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobtrack"]
      interval: 5s
      timeout: 5s
      retries: 5

